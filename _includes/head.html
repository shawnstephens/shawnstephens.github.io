<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>{% if page.title %}{{ page.title | escape }}{% else %}{{ site.title | escape }}{% endif %}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 | escape }}">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:site" content="@shawns02">
  <meta name="twitter:title" content="{{ page.title }}">

  {% if page.description %}
    <meta name="twitter:description"
      content="{{ page.meta_description }}">
  {% else %}
    <meta name="twitter:description"
      content="{{ page.excerpt | strip_html | xml_escape
        | truncate: 200 }}">
  {% endif %}

  {% if page.post_list_image %}
    <meta name="twitter:image"
      content="{{ site.baseurl }}/{{ page.post_list_image }}">
  {% endif %}

  <!-- <link rel="stylesheet" href="{{ "/assets/vendor/font-awesome.min.css" | relative_url }}"> -->
  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  <link rel="canonical" href="{{ page.url | replace:'index.html','' | absolute_url }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title | escape }}" href="{{ "/feed.xml" | relative_url }}">
  <link href="https://fonts.googleapis.com/css?family=Lato" rel="stylesheet">

  {% if jekyll.environment == 'production' and site.google_analytics %}
  {% include google-analytics.html %}
  {% endif %}
</head>
